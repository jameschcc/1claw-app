version: 1.0.0+1

environment:
  sdk: ^3.10.0-153.0.dev

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.1
  provider: ^6.1.2
